name: Veille Économique Chine

on:
  schedule:
    # 8h00 Shanghai (UTC+8 = 00:00 UTC) — lundi à vendredi
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  veille-economique:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests anthropic python-dotenv

      - name: Lancer l'agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python china_eco_agent.py

      - name: Sauvegarder seen_articles dans le dépôt
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add seen_eco_articles.json || true
          git diff --staged --quiet || git commit -m "MAJ seen_eco $(date +%Y-%m-%d)"
          git push

      - name: Sauvegarder le rapport
        uses: actions/upload-artifact@v4
        with:
          name: eco-chine-${{ github.run_number }}
          path: rapports/
          retention-days: 90
