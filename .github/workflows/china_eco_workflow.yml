name: Veille économique Chine

on:
  schedule:
    - cron: '0 0 * * 1-5'  # du lundi au vendredi à 00:00 UTC
  workflow_dispatch:

jobs:
  veille-economique:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}
          restore-keys: seen-eco-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml python-dotenv

      - name: Run agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python china_eco_agent.py

      - name: Save seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: eco-chine
          path: rapports/
          retention-days: 90
