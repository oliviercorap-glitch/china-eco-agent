name: China Economic Intelligence

on:
  schedule:
    - cron: '0 0 * * 1-5'          # du lundi au vendredi à 00:00 UTC (8h Shanghai)
  workflow_dispatch:               # permet un déclenchement manuel

permissions:
  contents: write
  pages: write                     # nécessaire pour déployer sur gh-pages

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Restore seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}
          restore-keys: seen-eco-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv

      - name: Run China Eco Agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python china_eco_agent.py

      - name: Save seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rapports
          publish_branch: gh-pages
          keep_files: false          # écrase tout pour ne garder que le dernier index.html
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy report ${{ github.run_id }}'
