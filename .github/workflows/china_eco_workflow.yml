name: China Economic Intelligence

on:
  schedule:
    - cron: '0 0 * * 1-5'          # du lundi au vendredi à 00:00 UTC (8h Shanghai)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (main branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Restore seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}
          restore-keys: seen-eco-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv

      - name: Run China Eco Agent
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python china_eco_agent.py

      - name: Save seen articles cache
        uses: actions/cache@v3
        with:
          path: seen_eco_articles.json
          key: seen-eco-${{ github.run_id }}

      - name: Commit and push HTML report to 'reports' branch
        run: |
          # Configurer git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Si la branche 'reports' existe déjà, on la supprime (on repart de zéro)
          if git ls-remote --heads origin reports | grep -q reports; then
            git push origin --delete reports
          fi

          # Créer une nouvelle branche orpheline 'reports'
          git checkout --orphan reports
          git rm -rf . || true
          git commit --allow-empty -m "Initial reports branch"
          git push origin reports

          # Revenir sur la branche pour y copier les rapports
          git checkout reports

          # Copier le rapport depuis le dossier 'rapports' (qui existe encore localement)
          mkdir -p reports
          cp rapports/*.html reports/ 2>/dev/null || true

          # Ajouter et commit
          git add reports/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update report $(date +'%Y-%m-%d %H:%M')"
            git push origin reports
          fi
